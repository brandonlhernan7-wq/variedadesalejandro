<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Variedades Alejandro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <img src="logoAV.png" alt="Logo" class="login-logo">
            <h2 class="form-title" style="color: var(--azul);">Acceso Administrativo</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••">
                </div>
                <button type="submit" class="btn-modern btn-save">Iniciar Sesión</button>
                <p style="margin-top: 20px;"><a href="index.html" class="back-link">← Volver a la tienda</a></p>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="login.js"></script>
</body>
</html>
