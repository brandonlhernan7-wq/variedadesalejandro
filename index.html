<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración - Variedades Alejandro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #1a4373;
            --rosado: #ff85a1;
            --gris-luz: #e2e8f0;
            --blanco: #f8fafc;
            --negro: #0f172a;
            --danger: #ef4444;
            --success: #22c55e;
            --sombra: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, #f8fafc, #e2e8f0);
            color: var(--negro);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Pantalla de Login */
        #login-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, var(--azul) 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeInUp 0.6s ease-out;
        }

        /* Layout del Dashboard */
        .admin-wrapper {
            display: none; /* Se activa tras login */
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
            width: 100%;
            animation: fadeInUp 0.8s ease-out;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
        }

        .admin-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        /* --- RESPONSIVIDAD --- */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr; /* Apilar formulario sobre inventario */
            }
            .admin-wrapper {
                padding: 20px;
            }
        }

        @media (max-width: 600px) {
            .login-card {
                padding: 25px 20px;
                margin: 15px;
                border-radius: 24px;
            }
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .dashboard-header .btn-modern {
                width: 100%;
                justify-content: center;
            }
            .glass-card {
                padding: 20px;
            }
        }

        .glass-card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--sombra);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-modern {
            text-decoration: none;
            background: var(--azul);
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(26, 67, 115, 0.3);
        }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; color: #64748b; }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            background: #f8fafc;
            font-family: inherit;
        }
        
        .form-control:focus { border-color: var(--azul); outline: none; background: white; }

        /* Inventario */
        .search-box {
            margin-bottom: 20px;
            position: relative;
        }

        .inventory-list {
            display: grid;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .inventory-item {
            display: flex;
            align-items: center;
            background: #f8fafc;
            padding: 12px 20px;
            border-radius: 18px;
            border: 1px solid transparent;
            animation: slideIn 0.4s ease-out backwards;
        }

        .inventory-item:hover {
            background: white;
            border-color: var(--gris-luz);
            transform: scale(1.01);
        }

        /* CORRECCIÓN: Contenedor y ajuste adaptativo para fotos en la lista */
        .item-img {
            width: 50px;
            height: 65px; /* Un poco más alto para favorecer ropa larga */
            border-radius: 8px;
            object-fit: contain; /* Muestra toda la prenda sin cortes */
            margin-right: 15px;
            background: #f1f5f9; /* Fondo suave para los espacios de fotos transparentes o angostas */
            border: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .item-info { flex-grow: 1; }
        .item-name { font-weight: 600; display: block; }
        .item-price { color: var(--azul); font-size: 0.9rem; font-weight: 700; }

        .action-btns { display: flex; gap: 8px; }
        .btn-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-edit { background: var(--azul); }
        .btn-del { background: var(--danger); }

        /* CORRECCIÓN: Previsualización de formulario adaptada a ropa larga */
        #img-preview {
            width: 120px;
            height: 160px; /* Proporción ideal vertical */
            object-fit: contain; /* No deforma el pantalón en el preview */
            border-radius: 12px;
            border: 2px solid var(--gris-luz);
            background: #f1f5f9;
            display: block;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gris-luz); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Pantalla de Inicio de Sesión -->
    <div id="login-screen">
        <div class="login-card">
            <img src="sflogoVa.png" alt="Logo" style="width: 100px; height: 100px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));">
            <h2 style="color: var(--azul); margin-bottom: 25px;">Acceso Administrativo</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="user" class="form-control" required placeholder="Ej: nombre">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="pass" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-modern" style="width: 100%; justify-content: center; background: var(--rosado); margin-top: 10px;">Acceder ahora</button>
                <p style="margin-top: 20px;"><a href="index.html" style="color: var(--azul); text-decoration: none; font-size: 0.85rem; font-weight: 600;">← Volver a la tienda</a></p>
            </form>
        </div>
    </div>

    <div class="admin-wrapper" id="admin-panel">
        <header class="dashboard-header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <img src="sflogoVa.png" alt="Logo" class="admin-logo">
                <div>
                    <h1 style="margin: 0; color: var(--azul); font-size: 1.8rem;">Dashboard de Alejandro</h1>
                    <p style="margin: 5px 0 0; color: #64748b; font-size: 0.9rem;">Gestiona tus productos y servicios</p>
                </div>
            </div>
            <a href="index.html" class="btn-modern">Ver Tienda Online</a>
        </header>

        <div class="dashboard-grid">
            <!-- Lado Izquierdo: Formulario -->
            <aside class="glass-card">
                <h3 id="form-title" style="margin-top: 0; margin-bottom: 25px;">Añadir Producto</h3>
                <form id="productForm" onsubmit="saveProduct(event)">
                    <input type="hidden" id="edit-index" value="">
                    <div class="form-group">
                        <label>Nombre del Producto</label>
                        <input type="text" id="formName" class="form-control" required placeholder="Ej: Camisa de Seda">
                    </div>
                    <div class="form-group">
                        <label>Precio</label>
                        <input type="text" id="formPrice" class="form-control" required placeholder="Ej: $25.00">
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <select id="formCat" class="form-control">
                            <option value="electro">Electrodomésticos</option>
                            <option value="mujer-ropa">Ropa Mujer</option>
                            <option value="mujer-calzado">Calzado Mujer</option>
                            <option value="hombre-ropa">Ropa Hombre</option>
                            <option value="hombre-calzado">Calzado Hombre</option>
                            <option value="ninos-ropa">Ropa Niños</option>
                            <option value="ninos-calzado">Calzado Niños</option>
                            <option value="belleza">Salón de Belleza</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Variantes / Tallas</label>
                        <input type="text" id="formSizes" class="form-control" placeholder="Ej: S, M, L o Única">
                    </div>
                    <div class="form-group">
                        <label>Imagen del Producto</label>
                        <input type="file" id="formFile" class="form-control" accept="image/*" onchange="processFile(event)">
                        <div id="preview-container" style="margin-top: 15px; display: none;">
                            <img id="img-preview" src="">
                        </div>
                    </div>
                    <button type="submit" id="submit-btn" class="btn-modern" style="width: 100%; justify-content: center; background: var(--rosado);">Guardar Producto</button>
                    <button type="button" id="cancel-edit" onclick="resetForm()" class="btn-modern" style="width: 100%; justify-content: center; background: #64748b; margin-top: 10px; display: none;">Cancelar Edición</button>
                </form>
            </aside>

            <!-- Lado Derecho: Inventario -->
            <main class="glass-card">
                <div class="search-box">
                    <input type="text" id="adminSearch" class="form-control" placeholder="🔍 Buscar en el inventario..." oninput="renderAdminList()">
                </div>
                <div class="inventory-list" id="adminItemsList">
                    <!-- Items dinámicos -->
                </div>
            </main>
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('alejandro_products')) || [];
        let base64ImageStr = "";

        // Función de Login
        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            if (user === "alejandro" && pass === "123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                renderAdminList();
            } else {
                alert("Usuario o contraseña incorrectos");
            }
        }

        function processFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                base64ImageStr = e.target.result;
                document.getElementById('img-preview').src = base64ImageStr;
                document.getElementById('preview-container').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function saveProduct(e) {
            e.preventDefault();
            const editIdx = document.getElementById('edit-index').value;
            
            const newProduct = {
                name: document.getElementById('formName').value.trim(),
                price: document.getElementById('formPrice').value.trim(),
                cat: document.getElementById('formCat').value,
                sizes: document.getElementById('formSizes').value.trim(),
                img: base64ImageStr || (editIdx !== "" ? products[editIdx].img : "")
            };

            try {
                if (editIdx !== "") {
                    products[editIdx] = newProduct;
                    alert("Producto actualizado!");
                } else {
                    products.push(newProduct);
                    alert("Producto guardado!");
                }
                localStorage.setItem('alejandro_products', JSON.stringify(products));
            } catch (e) {
                alert("Error: El almacenamiento está lleno. Intenta subir una imagen más pequeña.");
                console.error("LocalStorage error:", e);
            }

            resetForm();
            renderAdminList();
        }

        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('edit-index').value = "";
            document.getElementById('form-title').innerText = "Añadir Producto";
            document.getElementById('submit-btn').innerText = "Guardar Producto";
            document.getElementById('cancel-edit').style.display = "none";
            document.getElementById('preview-container').style.display = "none";
            base64ImageStr = "";
        }

        function editProduct(idx) {
            const p = products[idx];
            document.getElementById('edit-index').value = idx;
            document.getElementById('formName').value = p.name;
            document.getElementById('formPrice').value = p.price;
            document.getElementById('formCat').value = p.cat;
            document.getElementById('formSizes').value = p.sizes;
            
            if (p.img) {
                document.getElementById('img-preview').src = p.img;
                document.getElementById('preview-container').style.display = 'block';
            }
            
            document.getElementById('form-title').innerText = "Editando: " + p.name;
            document.getElementById('submit-btn').innerText = "Actualizar Cambios";
            document.getElementById('cancel-edit').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderAdminList() {
            const list = document.getElementById('adminItemsList');
            const query = document.getElementById('adminSearch').value.toLowerCase();
            list.innerHTML = '';

            const filtered = products.filter(p => p.name.toLowerCase().includes(query));

            if (filtered.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:40px; color:#64748b;">No se encontraron productos.</div>`;
                return;
            }

            filtered.forEach((p, originalIdx) => {
                const idx = products.indexOf(p);
                const row = document.createElement('div');
                row.className = 'inventory-item';
                row.style.animationDelay = `${originalIdx * 0.05}s`;
                row.innerHTML = `
                    <img src="${p.img || 'https://via.placeholder.com/50'}" class="item-img">
                    <div class="item-info">
                        <span class="item-name">${p.name}</span>
                        <span class="item-price">${p.price}</span>
                    </div>
                    <div class="action-btns">
                        <button class="btn-icon btn-edit" onclick="editProduct(${idx})" title="Editar">✏️</button>
                        <button class="btn-icon btn-del" onclick="deleteProduct(${idx})" title="Eliminar">🗑️</button>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function deleteProduct(idx) {
            if (confirm("¿Eliminar producto?")) {
                products.splice(idx, 1);
                localStorage.setItem('alejandro_products', JSON.stringify(products));
                renderAdminList();
            }
        }
    </script>
    <!-- Netlify Identity -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  netlifyIdentity.on("init", user => {
    if (!user) {
      netlifyIdentity.open() // Si no hay sesión, pide login
    }
  })
</script>
</body>
</html>
</html>
